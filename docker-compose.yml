services:
  fairness-audit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fairness-audit-container
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - .:/app
    command: ["python", "main.py"]
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import torch; print(torch.__version__)"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
